# Nginx configuration for the React SPA bundle.
#
# `try_files $uri $uri/ /index.html` rewrites unknown paths to index.html
# so client-side routes (e.g. /projects/42) load the SPA shell instead
# of returning 404 on direct visits or page refreshes.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the hashed static assets emitted by Vite.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback for everything else.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tighten gzip on text resources.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
